# ====================================================
# Render.com Blueprint Configuration for QuickCV
# ====================================================

services:
  - type: web
    name: quickcv-telegram-saas
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    runtime: python-3.11.0 # Or appropriate python-3.11+ environment
    envVars:
      - key: USER_BOT_TOKEN
        sync: false
      - key: ADMIN_BOT_TOKEN
        sync: false
      - key: CREDIT_BOT_TOKEN
        sync: false
      - key: OPENCODE_API_KEY
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: PORT
        value: 10000

